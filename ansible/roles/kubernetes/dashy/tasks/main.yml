---
- name: Add Helm repository for Dashy
  community.kubernetes.helm_repository:
    name: dashy
    repo_url: "https://charts.dashy.io"
  register: dashy_repo

- name: Create namespace for Dashy if not exists
  community.kubernetes.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ dashy_namespace }}"
    state: present

- name: Deploy Dashy via Helm chart
  community.kubernetes.helm:
    name: "{{ dashy_release_name }}"
    chart_ref: "{{ dashy_chart }}"
    version: "{{ dashy_chart_version }}"
    namespace: "{{ dashy_namespace }}"
    values: "{{ lookup('template', 'templates/values.yaml.j2') | from_yaml }}"
    wait: yes
    timeout: 300
  register: dashy_deploy
